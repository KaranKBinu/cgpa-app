<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1a14"/>
      <stop offset="100%" stop-color="#060a07"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="512" height="512" rx="96" fill="none" stroke="#10b981" stroke-width="6" stroke-opacity="0.18"/>

  <!-- Glow bloom -->
  <ellipse cx="256" cy="256" rx="180" ry="180" fill="url(#glow)"/>

  <!-- Letter P -->
  <text
    x="256"
    y="352"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="310"
    text-anchor="middle"
    fill="url(#letter)"
    filter="url(#glowFilter)"
  >P</text>

  <!-- Accent dot — emerald indicator -->
  <circle cx="356" cy="152" r="26" fill="#10b981" opacity="0.9"/>
</svg>
